[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]
preview = ["pixi-build"]

# -------------------------------
# === Packaging Configuration ===
# -------------------------------
[package]
version = "dynamic"

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.build.config]
noarch = false
compilers = ["c"]

[workspace.build-variants]
python = ["3.10.*", "3.11.*", "3.12.*", "3.13.*", "3.14.*"]

[package.host-dependencies]
uv = "*"
python = "*"
hatch-cython = ">=0.6.0"
hatch-vcs = "*"
numpy = "*"
cherab = "*"

[package.run-dependencies]
calcam = "*"
scipy = "*"
matplotlib-base = "*"
plotly = "*"
pooch = "*"
paramiko = "*"
tqdm = "*"
rich = "*"
cairosvg = "*"
xarray = "*"
netcdf4 = "*"
ffmpeg = "*"

# ---------------------------------
# === Development Configuration ===
# ---------------------------------
[dependencies]
cherab-nagdis = { path = "." }
ipython = "*"

# Type stubs
scipy-stubs = "*"
cherab-stubs = { git = "https://github.com/munechika-koyo/cherab-stubs.git" }


# For JupyterLab and interactive plots
ipykernel = "*"
ipywidgets = "*"
jupyterlab = "*"
jupyter_bokeh = "*"
hvplot = "*"
panel = "*"
selenium = "*"
phantomjs = "*"
geckodriver = "*"
firefox = "*"
astroquery = ">=0.4.10,<0.5"
lmfit = ">=1.3.3,<2"

# For plotting publication quality figures
ultraplot = ">=1.72.0"

[pypi-dependencies]
wvfreader = "*"

[tasks]
dataset = { cmd = [
  "python",
  "-c",
  "'from experiment.dataset import create_dataset; create_dataset()'",
], description = "Create dataset for the experiment" }
ca = { cmd = "python scripts/ca.py", description = "Run Conditional & Moving Average of dataset" }
lab = { cmd = "jupyter lab --notebook-dir notebooks/", description = "🚀 Launch Jupyter Lab" }

[activation.env]
SSH_RAYTRACE_HOSTNAME = "sftp://133.6.100.44/home/koyo/cherab/nagdis/"
SSH_RAYTRACE_USERNAME = "koyo"

# === Testing feature ===
[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"

[feature.test.pypi-dependencies]
pytest-github-report = "*"

[feature.test.tasks]
test = { cmd = ["pytest", "tests"], description = "🧪 Run the tests" }

# === Documentation feature ===
[feature.docs.dependencies]
sphinx = ">=7,<8.2"
sphinx-copybutton = "*"
sphinx-codeautolink = "*"
sphinx-design = "*"
sphinx-immaterial = "*"
linkify-it-py = "*"
myst-parser = "*"

# For notebook support
ipykernel = "*"
ipywidgets = "*"
nbsphinx = "*"
pandoc = "*"

[feature.docs.pypi-dependencies]
sphinx-github-style = "*"
sphinx-api-relink = "*"

[feature.docs.tasks]
doc-build = { cmd = [
  "sphinx-build",
  "-b",
  "{{ target }}",
  "source",
  "build/{{ target }}",
], cwd = "docs", args = [
  { arg = "target", default = "html" },
], description = "📝 Build the docs" }
doc-serve = { cmd = [
  "python",
  "-m",
  "http.server",
  "8000",
  "--directory",
  "build/html",
], cwd = "docs", description = "🚀 Start a local server for the docs" }


# === Linting feature ===
[feature.lint.dependencies]
dprint = "*"
lefthook = "*"
ruff = "*"
typos = "*"
pyrefly = "*"
actionlint = "*"
shellcheck = "*"
validate-pyproject = "*"
cython-lint = "*"
blacken-docs = "*"
taplo = "*"
nbstripout = ">=0.9.1,<0.10"


[feature.lint.tasks]
lefthook = { cmd = "lefthook", description = "🔗 Run lefthook" }
hooks = { cmd = "lefthook install", description = "🔗 Install pre-commit hooks" }
pre-commit = { cmd = "lefthook run pre-commit", description = "🔗 Run pre-commit checks" }
pyrefly-check = { cmd = "pyrefly check", description = "Type check with pyrefly" }
ruff-check = { cmd = "ruff check --fix", description = "Lint with ruff" }
ruff-format = { cmd = "ruff format", description = "Format with ruff" }
dprint = { cmd = "dprint fmt", description = "Format with dprint" }
typos = { cmd = "typos --write-changes --force-exclude", description = "Fix typos" }
taplo = { cmd = "taplo fmt", description = "Format toml files with taplo" }
actionlint = { cmd = "actionlint", description = "Lint actions with actionlint" }
blacken-docs = { cmd = "blacken-docs", description = "Format Python markdown blocks with Black" }
validate-pyproject = { cmd = "validate-pyproject pyproject.toml", description = "Validate pyproject.toml" }
cython-lint = { cmd = "cython-lint", description = "Lint Cython files" }
lint = { cmd = "lefthook run pre-commit --all-files --force", description = "🧹 Run all linters" }


# === Build feature ===
[feature.build.dependencies]
python-build = "*"

[feature.build.dev]
cherab-nagdis = { path = "." }

[feature.build.tasks]
build-wheel = { cmd = "python -m build -nx -w", description = "🔧 Build wheel distribution" }
build-sdist = { cmd = "python -m build -nx -s", description = "🔧 Build source distribution" }

# === Tools feature ===
# This feature is used for miscellaneous tools that don't need any specific dependencies.
[feature.tools.tasks]
clean = { cmd = [
  "find",
  "src/",
  "-type",
  "f",
  "\\(",
  "-name",
  "'*.c'",
  "-o",
  "-name",
  "'*.so'",
  "-o",
  "-name",
  "'*.dylib'",
  "-o",
  "-name",
  "'*.html'",
  "\\)",
  "-delete",
], description = "🔥 Remove build artifacts and temporary files (e.g. *.c, *.so, *.dylib, *.html)" }

doc-clean = { cmd = [
  "rm",
  "-rf",
  "build",
  "source/_api",
], cwd = "docs", description = "🔥 Clean the docs build & api directory" }

# === Python environment features ===
[feature.py310.dependencies]
python = "3.10.*"
[feature.py314.dependencies]
python = "3.14.*"

[environments]
default = { features = ["py314"], solve-group = "py314" }
docs = { features = ["py314", "docs"], solve-group = "py314" }
test = { features = ["py314", "test"], solve-group = "py314" }
test-py310 = ["py310", "test"]
test-py314 = { features = [
  "py314",
  "test",
], solve-group = "py314" } # alias of test
lint = ["lint", "test"]
build = { features = ["build"], no-default-feature = true }
tools = { features = ["tools"], no-default-feature = true }
